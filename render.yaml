services:
  - type: web
    name: summit-ai-services
    runtime: node
    buildCommand: npm run build
    startCommand: npm start
    disk:
      name: summit-ai-services-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:../data/dentalai.db
